<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TAG ATTACK PRO - DUMB BRAINEZ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;900&display=swap');
        body { font-family: 'Outfit', sans-serif; touch-action: none; overflow: hidden; background: #7dd3fc; user-select: none; margin: 0; padding: 0; }
        canvas { display: block; width: 100vw; height: 100vh; }
        
        .gumball-panel { background: #ffffff; border: 6px solid #0f172a; box-shadow: 10px 10px 0px #0f172a; border-radius: 35px; }
        .status-pill {
            background: white; border: 4px solid #0f172a; padding: 8px 20px;
            border-radius: 15px; font-weight: 900; font-size: 18px;
            box-shadow: 4px 4px 0px #0f172a; color: #0f172a;
        }

        #chat-ui {
            position: fixed; top: 100px; left: 20px; width: 260px; height: 180px;
            z-index: 100; pointer-events: none; display: flex; flex-direction: column;
        }
        #chat-box {
            flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 5px;
            padding: 10px; pointer-events: none;
        }
        .chat-bubble {
            background: rgba(15, 23, 42, 0.8); color: white; padding: 6px 12px;
            border-radius: 12px; font-size: 14px; font-weight: 700; width: fit-content;
            animation: fadeIn 0.3s ease; border: 2px solid rgba(255,255,255,0.2);
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
        
        #chat-input-container { pointer-events: auto; display: flex; gap: 5px; margin-top: 5px; }
        #chat-input { flex: 1; background: white; border: 3px solid #0f172a; border-radius: 10px; padding: 5px 10px; font-weight: 900; outline: none; }
        #chat-send { background: #fbbf24; border: 3px solid #0f172a; border-radius: 10px; padding: 5px 10px; font-weight: 900; cursor: pointer; }

        .joystick-base { 
            width: 120px; height: 120px; background: rgba(15, 23, 42, 0.1); border: 5px solid #0f172a; border-radius: 50%; 
            position: fixed; bottom: 40px; left: 40px; display: flex; align-items: center; justify-content: center; z-index: 50;
        }
        .joystick-knob { width: 50px; height: 50px; background: #fbbf24; border: 5px solid #0f172a; border-radius: 50%; pointer-events: none; }
        
        .btn-dash { 
            position: fixed; bottom: 40px; right: 40px; width: 110px; height: 110px; 
            background: #ef4444; border: 6px solid #0f172a; box-shadow: 8px 8px 0px #0f172a; 
            border-radius: 30px; color: white; font-weight: 900; display: flex; align-items: center; justify-content: center; z-index: 50;
            transition: all 0.1s; font-size: 20px;
        }

        .emote-wheel {
            position: fixed; bottom: 40px; right: 170px; display: flex; gap: 10px; z-index: 50;
        }
        .emote-btn {
            width: 50px; height: 50px; background: white; border: 3px solid #0f172a; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer;
            box-shadow: 3px 3px 0px #0f172a; transition: transform 0.1s;
        }
        .emote-btn:active { transform: translateY(3px) scale(0.9); box-shadow: 0px 0px 0px #0f172a; }

        .skin-opt { width: 45px; height: 45px; border: 4px solid #0f172a; border-radius: 12px; cursor: pointer; transition: 0.2s; position: relative; overflow: hidden; }
        .skin-opt.active { transform: scale(1.2); border-color: #fbbf24; }

        #toast { 
            position: fixed; top: 20%; left: 50%; transform: translateX(-50%); z-index: 1000; 
            pointer-events: none; font-weight: 900; color: #ef4444; font-size: 28px; 
            text-shadow: 2px 2px 0 #fff; display: none; text-align: center; background: white; padding: 10px 20px; border: 4px solid #0f172a; border-radius: 20px;
        }

        #loading-overlay { position: fixed; inset: 0; background: rgba(125, 211, 252, 0.9); z-index: 500; display: none; align-items: center; justify-content: center; font-weight: 900; font-size: 24px; color: #0f172a; }
    </style>
</head>
<body>

    <div id="toast"></div>
    <div id="loading-overlay">CONNECTING...</div>

    <div id="victory-screen" class="fixed inset-0 bg-slate-900/90 z-[2000] hidden flex-col items-center justify-center">
        <div class="gumball-panel p-10 text-center">
            <h2 class="text-4xl font-black mb-4 italic">GAME OVER!</h2>
            <p id="loser-text" class="text-2xl font-bold text-red-500 mb-8 uppercase"></p>
            <button onclick="location.reload()" class="bg-yellow-400 border-4 border-slate-800 px-8 py-4 rounded-2xl font-black shadow-[4px_4px_0px_#0f172a]">MENU</button>
        </div>
    </div>

    <!-- MAIN MENU -->
    <div id="menu" class="fixed inset-0 z-[150] flex flex-col items-center justify-center p-4 bg-[#7dd3fc]">
        <div class="gumball-panel p-8 w-full max-w-sm text-center">
            <h1 class="text-5xl font-black italic text-slate-800 uppercase leading-none mb-1">TAG ATTACK</h1>
            <p class="text-red-600 font-black mb-6 text-sm italic tracking-widest uppercase">BY DUMB BRAINEZ</p>

            <input type="text" id="nameInput" placeholder="YOUR NAME" class="w-full bg-slate-50 border-4 border-slate-800 p-4 rounded-2xl text-center font-black text-xl outline-none uppercase shadow-[4px_4px_0px_#0f172a] mb-4">
            
            <p class="text-xs font-black uppercase mb-2">Select Skin</p>
            <div class="flex flex-wrap justify-center gap-3 mb-8">
                <div class="skin-opt active" data-color="#22c55e" style="background: #22c55e;"></div>
                <div class="skin-opt" data-color="#f97316" style="background: #f97316;"></div>
                <div class="skin-opt" data-color="#a855f7" style="background: #a855f7;"></div>
                <div class="skin-opt" data-color="#ec4899" style="background: #ec4899;"></div>
                <div class="skin-opt" data-color="gumball" style="background: #50bfe6; display: flex; align-items: center; justify-content: center; font-size: 24px;">🐱</div>
            </div>

            <div class="space-y-4">
                <button onclick="openMapSelect()" class="w-full bg-yellow-400 border-4 border-slate-800 shadow-[6px_6px_0px_#0f172a] font-black py-4 rounded-2xl text-xl uppercase active:translate-y-1">HOST ROOM</button>
                <div class="flex gap-2">
                    <input type="text" id="roomInput" maxlength="4" placeholder="CODE" class="w-1/3 bg-white border-4 border-slate-800 rounded-2xl text-center font-black">
                    <button onclick="setupRoom(false)" class="w-2/3 bg-emerald-400 border-4 border-slate-800 shadow-[4px_4px_0px_#0f172a] font-black py-4 rounded-2xl text-lg uppercase active:translate-y-1">JOIN</button>
                </div>
            </div>
        </div>
    </div>

    <!-- MAP SELECT -->
    <div id="mapMenu" class="fixed inset-0 z-[160] flex flex-col items-center justify-center p-4 bg-[#7dd3fc] hidden">
        <div class="gumball-panel p-8 w-full max-w-sm text-center">
            <h2 class="text-3xl font-black mb-6 italic uppercase">ARENA</h2>
            <button onclick="startHost(0)" class="w-full bg-emerald-400 border-4 border-slate-800 py-4 rounded-2xl font-black mb-4 shadow-[4px_4px_0px_#0f172a]">MAP-ING</button>
            <button onclick="startHost(1)" class="w-full bg-slate-800 text-cyan-400 border-4 border-cyan-400 py-4 rounded-2xl font-black mb-4 shadow-[4px_4px_0px_#06b6d4]">NEON VOID</button>
            <button onclick="startHost(2)" class="w-full bg-orange-400 border-4 border-slate-800 py-4 rounded-2xl font-black mb-6 shadow-[4px_4px_0px_#0f172a]">ELMORE HIGH</button>
        </div>
    </div>

    <!-- HUD -->
    <div id="hud" class="fixed top-5 left-0 right-0 flex justify-center gap-4 z-50 pointer-events-none hidden">
        <div id="timerBox" class="status-pill">03:00</div>
        <div id="roomDisplay" class="status-pill border-blue-500 text-blue-500 pointer-events-auto cursor-pointer" onclick="copyRoomCode()">ID: ----</div>
    </div>

    <!-- CHAT UI -->
    <div id="chat-ui" class="hidden">
        <div id="chat-box"></div>
        <div id="chat-input-container">
            <input type="text" id="chat-input" placeholder="Say..." maxlength="40">
            <button id="chat-send">GO</button>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div id="controls" class="hidden">
        <div class="joystick-base" id="joyBase"><div class="joystick-knob" id="joyKnob"></div></div>
        <div class="emote-wheel">
            <button class="emote-btn" onclick="sendEmote('😂')">😂</button>
            <button class="emote-btn" onclick="sendEmote('😡')">😡</button>
            <button class="emote-btn" onclick="sendEmote('😎')">😎</button>
        </div>
        <button class="btn-dash" id="dashBtn">DASH</button>
    </div>

    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let myId, peer, conn, isHost = false, players = {}, myName = "";
        let joyPos = { x: 0, y: 0 }, isDashing = false;
        let worldSize = 3000, cam = { x: 1500, y: 1500 };
        let traps = [], pickups = [], obstacles = [], selectedMap = 0, currentRoomCode = "", gameActive = true;
        let myColor = "#22c55e", matchTimer = 180, shake = 0;
        let particles = [];

        const maps = [
            { name: "MAP-ING", bg: "#7dd3fc", floor: "#4ade80", wall: "#0f172a", blockColor: "#ffb6c1" },
            { name: "NEON VOID", bg: "#020617", floor: "#0f172a", wall: "#06b6d4", blockColor: "#1e293b" },
            { name: "ELMORE HIGH", bg: "#fef3c7", floor: "#d1d5db", wall: "#1e40af", blockColor: "#fbbf24" }
        ];

        document.querySelectorAll('.skin-opt').forEach(opt => {
            opt.onclick = () => {
                document.querySelectorAll('.skin-opt').forEach(o => o.classList.remove('active'));
                opt.classList.add('active');
                myColor = opt.dataset.color;
            };
        });

        function addChatMessage(msg, name = "SYSTEM") {
            const box = document.getElementById('chat-box');
            if(!box) return;
            const bubble = document.createElement('div');
            bubble.className = 'chat-bubble';
            bubble.innerHTML = `<span style="color: #fbbf24">${name}:</span> ${msg}`;
            box.appendChild(bubble);
            box.scrollTop = box.scrollHeight;
            setTimeout(() => bubble.remove(), 8000);
        }

        function sendEmote(emote) {
            if(isHost) {
                players[myId].emote = emote;
                players[myId].emoteTime = Date.now() + 2000;
                broadcast({ type: 'emote', id: myId, emote });
            } else if(conn?.open) {
                conn.send({ type: 'emote', emote });
            }
        }

        document.getElementById('chat-send').onclick = sendChat;
        document.getElementById('chat-input').onkeydown = (e) => { if(e.key === 'Enter') sendChat(); };

        function sendChat() {
            const input = document.getElementById('chat-input');
            const msg = input.value.trim();
            if(!msg) return;
            if(isHost) {
                broadcast({ type: 'chat', name: myName, msg });
                addChatMessage(msg, myName);
            } else if(conn?.open) {
                conn.send({ type: 'chat', name: myName, msg });
            }
            input.value = '';
        }

        function showToast(txt) {
            const t = document.getElementById('toast'); t.innerText = txt; t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        }

        function copyRoomCode() {
            const el = document.createElement('textarea');
            el.value = currentRoomCode; document.body.appendChild(el);
            el.select(); document.execCommand('copy');
            document.body.removeChild(el);
            showToast("ID COPIED: " + currentRoomCode);
        }

        function openMapSelect() {
            if(!document.getElementById('nameInput').value.trim()) return showToast("ENTER NAME!");
            document.getElementById('mapMenu').classList.remove('hidden');
        }

        function generateObstacles(mapIdx) {
            const obs = [];
            if(mapIdx === 2) { // Elmore High
                for(let i=0; i<6; i++) obs.push({ x: 500, y: 400 + i*500, w: 2000, h: 60, type: 'wall' });
                for(let i=0; i<20; i++) obs.push({ x: Math.random()*2400+300, y: Math.random()*2400+300, w: 70, h: 100, type: 'core' });
            } else { 
                for(let i=0; i<25; i++) obs.push({ x: Math.random()*2500+250, y: Math.random()*2500+250, w: Math.random()>0.5?300:80, h: Math.random()>0.5?80:300, type: 'wall' });
            }
            obs.push({ x: worldSize/2-150, y: worldSize/2-150, w: 300, h: 300, type: 'core' });
            return obs;
        }

        function startHost(m) { selectedMap = m; setupRoom(true); }

        function broadcast(data) {
            if(!isHost || !peer) return;
            for(let id in peer.connections) {
                peer.connections[id].forEach(c => { if(c.open) c.send(data); });
            }
        }

        function setupRoom(host) {
            document.getElementById('loading-overlay').style.display = 'flex';
            isHost = host;
            myName = document.getElementById('nameInput').value.trim().toUpperCase() || "GUEST";
            const code = host ? Math.floor(1000 + Math.random()*9000).toString() : document.getElementById('roomInput').value;
            if(!code) { document.getElementById('loading-overlay').style.display = 'none'; return showToast("ENTER CODE"); }
            currentRoomCode = code;

            if (peer) peer.destroy();
            peer = new Peer('tag-' + code);

            peer.on('open', (id) => {
                document.getElementById('loading-overlay').style.display = 'none';
                myId = id;
                document.getElementById('menu').style.display = 'none';
                document.getElementById('mapMenu').classList.add('hidden');
                document.getElementById('hud').classList.remove('hidden');
                document.getElementById('controls').classList.remove('hidden');
                document.getElementById('chat-ui').classList.remove('hidden');
                document.getElementById('roomDisplay').innerText = "ID: " + code;
                
                if(host) {
                    obstacles = generateObstacles(selectedMap);
                    players[myId] = { x: 500, y: 500, isIt: true, name: myName, color: myColor, protection: 0, frozen: 0, speedBoost: 0, shield: false };
                    for(let i=0; i<8; i++) traps.push({x: Math.random()*2600+200, y: Math.random()*2600+200});
                    for(let i=0; i<4; i++) pickups.push({x: Math.random()*2600+200, y: Math.random()*2600+200, type: Math.random()>0.5?'speed':'shield'});
                    requestAnimationFrame(gameLoop);
                } else {
                    conn = peer.connect('tag-' + code, { reliable: true });
                    conn.on('open', () => {
                        conn.send({ type: 'join', name: myName, color: myColor });
                        requestAnimationFrame(gameLoop);
                    });
                    conn.on('data', (d) => {
                        if(d.type === 'state') { players = d.players; traps = d.traps; pickups = d.pickups; matchTimer = d.timer; selectedMap = d.map; obstacles = d.obstacles; }
                        if(d.type === 'chat') addChatMessage(d.msg, d.name);
                        if(d.type === 'tag') { showToast(d.msg); addChatMessage(d.msg); shake = 15; }
                        if(d.type === 'emote') { if(players[d.id]) { players[d.id].emote = d.emote; players[d.id].emoteTime = Date.now() + 2000; }}
                        if(d.type === 'gameOver') { gameActive = false; document.getElementById('victory-screen').classList.remove('hidden'); document.getElementById('loser-text').innerText = d.loser + " LOST!"; }
                    });
                }
            });

            if(host) {
                peer.on('connection', (c) => {
                    c.on('data', (d) => {
                        if(d.type === 'join') players[c.peer] = { x: 2500, y: 2500, isIt: false, name: d.name, color: d.color, protection: 5, frozen: 0, speedBoost: 0, shield: false };
                        if(d.type === 'chat') { addChatMessage(d.msg, d.name); broadcast({ type: 'chat', name: d.name, msg: d.msg }); }
                        if(d.type === 'move' && players[c.peer]) { players[c.peer].x = d.x; players[c.peer].y = d.y; }
                        if(d.type === 'emote') { players[c.peer].emote = d.emote; players[c.peer].emoteTime = Date.now() + 2000; broadcast({type:'emote', id: c.peer, emote: d.emote}); }
                    });
                });
            }
        }

        function checkCollision(p) {
            obstacles.forEach(ob => {
                if(p.x > ob.x-45 && p.x < ob.x+ob.w+45 && p.y > ob.y-45 && p.y < ob.y+ob.h+45) {
                    const dx = p.x - (ob.x + ob.w/2), dy = p.y - (ob.y + ob.h/2);
                    if(Math.abs(dx/ob.w) > Math.abs(dy/ob.h)) p.x = dx > 0 ? ob.x+ob.w+45 : ob.x-45;
                    else p.y = dy > 0 ? ob.y+ob.h+45 : ob.y-45;
                }
            });
        }

        function drawGumball(ctx) {
            // Face base
            ctx.fillStyle = '#50bfe6';
            ctx.beginPath();
            ctx.ellipse(0, 0, 45, 42, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // Ears
            ctx.beginPath();
            ctx.moveTo(-35, -20); ctx.lineTo(-45, -50); ctx.lineTo(-15, -35); ctx.fill();
            ctx.beginPath();
            ctx.moveTo(35, -20); ctx.lineTo(45, -50); ctx.lineTo(15, -35); ctx.fill();

            // Eyes
            ctx.fillStyle = 'white';
            ctx.beginPath(); ctx.ellipse(-15, -10, 15, 18, 0, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.ellipse(15, -10, 15, 18, 0, 0, Math.PI * 2); ctx.fill();
            
            ctx.fillStyle = 'black';
            ctx.beginPath(); ctx.ellipse(-12, -8, 6, 8, 0, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.ellipse(18, -8, 6, 8, 0, 0, Math.PI * 2); ctx.fill();

            // Nose
            ctx.fillStyle = '#ff99cc';
            ctx.beginPath(); ctx.arc(0, 8, 5, 0, Math.PI*2); ctx.fill();

            // Mouth / Whiskers
            ctx.strokeStyle = 'black'; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.arc(-6, 15, 6, Math.PI, 0, true); ctx.stroke();
            ctx.beginPath(); ctx.arc(6, 15, 6, Math.PI, 0, true); ctx.stroke();
        }

        function gameLoop() {
            if(!gameActive) return;
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            const curMap = maps[selectedMap];
            const me = players[myId];

            if(me) {
                if(me.frozen <= 0) {
                    let moveSpeed = (isDashing ? 28 : 13) * (me.speedBoost > 0 ? 1.5 : 1);
                    me.x = Math.max(50, Math.min(worldSize-50, me.x + joyPos.x * moveSpeed));
                    me.y = Math.max(50, Math.min(worldSize-50, me.y + joyPos.y * moveSpeed));
                    checkCollision(me);
                    
                    if(Math.hypot(joyPos.x, joyPos.y) > 0.1) {
                        particles.push({x: me.x, y:
